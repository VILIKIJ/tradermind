СТРАХ

Страх потери. "Что если цена пойдёт против меня?" Результат — не входишь в хорошие сделки. Ждёшь "идеального" момента который никогда не наступит.

Страх упустить (FOMO). "Цена летит вверх, надо входить немедленно!" Результат — входишь на пиках, в худший возможный момент.

Страх быть неправым. "Не могу закрыть убыток, потому что тогда это станет реальным." Результат — держишь убыточные позиции пока они не сожрут счёт.

Страх лечится одним: принятием риска до сделки. Буквально скажи себе: "Эти деньги уже потеряны. Я готов их потерять." Тогда движение цены против тебя не включает аварийный сигнал.

ЖАДНОСТЬ

Первое — FOMO (Fear Of Missing Out, страх упустить).
Второе — Revenge Trading (мстительная торговля).

FOMO: КАК ЭТО РАБОТАЕТ

Ты видишь: EURUSD резко летит вверх. +80 пипсов за 15 минут.

Твой план: ждать откат на уровень поддержки.
Твой мозг: "Я упускаю движение! Надо войти СЕЙЧАС!"

Ты входишь на пике. Цена разворачивается. Ты в убытке.

FOMO активируется когда мы видим что другие (или "рынок") зарабатывают, а мы нет. Это древний социальный инстинкт — в племени отставание означало смерть.

1. Напомни себе: ты ВСЕГДА будешь пропускать часть движений. Это не баг — это фича профессиональной торговли.

2. Запомни: войти на пике из-за FOMO — это почти гарантированный убыток.

3. Правило: "Если я не вошёл по плану — я не вхожу." Точка.

4. После каждого пропущенного движения запиши в журнал: "Я не вошёл потому что не было сетапа. Это правильное решение."

REVENGE TRADING: КАК ЭТО РАБОТАЕТ

Как распознать:
- Ты только что получил убыток
- Ты хочешь войти немедленно
- Ты думаешь о "возврате" денег, а не о сетапе
- Размер позиции больше обычного

Если хотя бы одно из этих условий верно — ты в режиме revenge trading.

Что делать:

Правило 30 минут: после любого убытка — 30 минут вне рынка. Закрой терминал. Встань из-за компьютера. Подыши.

После крупного убытка — правило 24 часов. Полная пауза.

Запомни: лучшая сделка после убытка — никакая сделка.

КАК СТРОИТЬ ДИСЦИПЛИНУ

Принцип 1: Правила, а не решения.

Чем меньше решений ты принимаешь в процессе торговли — тем лучше.

"Буду ли я передвигать стоп?" — не должен быть вопрос который ты задаёшь во время сделки. Ответ должен быть прописан в правилах ДО торговой сессии.

"Войду ли я в этот момент?" — не интуитивный вопрос. Это проверка чеклиста.

Принцип 2: Торговый ритуал.

Каждая профессиональная торговая сессия начинается одинаково:

- Квадратное дыхание (2-3 минуты)
- Повторение правил (вслух или про себя)
- Проверка новостного фона
- Определение максимального убытка дня
- Визуализация идеальной торговой сессии

Принципы успешные трейдеры строят СРЕДУ которая делает правильные действия лёгкими, а неправильные — сложными.

Поэтому профессионалы оценивают сделки не по результату, а по процессу.

ПЕРЕОСМЫСЛЕНИЕ УБЫТКА

Большинство трейдеров воспринимают убыток как провал. Как подтверждение что они "недостаточно хороши".

Это убивает.

1. Стоимость ведения бизнеса.
Ресторан списывает испорченные продукты. Авиакомпания платит за техническое обслуживание. Трейдер платит убытками за возможность участвовать в рынке.

- Что это говорит о моей системе?

Правило серии убытков:
- После 2 убытков подряд: уменьши размер позиции вдвое
- После 3 убытков подряд: торгуй минимальным размером или стоп на день

  const add=(d,n)=>{const r=new Date(d);r.setDate(r.getDate()+n);return fmt(r);};
  const t=fmt(now);
  return [
    {date:add(now,-1),event:"Non-Farm Payrolls",impact:"high",currency:"USD",actual:"228K",forecast:"135K",previous:"151K"},
    {date:add(now,-1),event:"Initial Jobless Claims",impact:"medium",currency:"USD",actual:"218K",forecast:"225K",previous:"222K"},

      </div>
      <div style={{padding:"0 16px"}}>
        {op.length===0?<div style={{...cs.card,textAlign:"center",padding:"28px 20px"}}>
          <div style={{fontSize:28,marginBottom:6}}>📊</div>
          <div style={{fontSize:14,fontWeight:700,color:txt,marginBottom:4}}>Нет открытых сделок</div>
          <div style={{fontSize:12,color:txt2}}>Нажми "+ Новая" и заполни чеклист</div>
        </div>:<>
          <div style={cs.sec}>Открытые ({op.length})</div>
          {op.map(t=><div key={t.id} onClick={()=>{setTid(t.id);setTv("detail");}} style={{...cs.card,display:"flex",alignItems:"center",gap:10,cursor:"pointer",borderLeft:`4px solid ${t.dir==="Long"?"#27ae60":"#e17055"}`}}>
            <div style={{flex:1}}>
              <div style={{display:"flex",gap:7,alignItems:"center",marginBottom:3}}>
                <span style={{fontSize:15,fontWeight:800,color:txt}}>{t.pair}</span>
                <span style={{padding:"1px 7px",borderRadius:99,fontSize:10,fontWeight:700,background:t.dir==="Long"?"#f0fff4":"#fff0f0",color:t.dir==="Long"?"#27ae60":"#e17055"}}>{t.dir}</span>
              </div>
              <div style={{fontSize:11,color:txt2}}>{t.setup||"Открытая сделка"}</div>
            </div>
            <div style={{color:txt3,fontSize:18}}>›</div>
          </div>)}
        </>}
        {cl2.length>0&&<><div style={{...cs.sec,marginTop:8}}>История ({cl2.length})</div>
          {cl2.slice(0,5).map(t=><div key={t.id} style={{...cs.card,opacity:0.6,display:"flex",alignItems:"center",gap:9}}>
            <span style={{fontSize:13,fontWeight:700,color:txt}}>{t.pair}</span>
            <span style={{fontSize:10,color:txt3}}>{t.dir}</span>
            <span style={{fontSize:10,padding:"1px 7px",borderRadius:99,background:"#f0fff4",color:"#27ae60",fontWeight:700}}>Закрыта</span>
          </div>)}
        </>}
      </div>
    </div>;
  }

  function NewsScreen(){
    const [evts,setEvts]=useState(()=>getEvents());
    const [lu,setLu]=useState(new Date());
    useEffect(()=>{const i=setInterval(()=>{setEvts(getEvents());setLu(new Date());},60000);return()=>clearInterval(i);},[]);
    const allC=["USD","EUR","GBP","JPY","CAD","AUD","CHF","NZD"];
    const iC={high:"#e17055",medium:"#fdcb6e",low:"#27ae60"};
    const iL={high:"Высокий",medium:"Средний",low:"Низкий"};
    const fe=evts.filter(e=>calF.includes(e.currency));
    const gr=fe.reduce((a,e)=>{a[e.date]=[...(a[e.date]||[]),e];return a;},{});
    const p=n=>String(n).padStart(2,"0");
    return <div style={cs.scr}>
      <div style={{...cs.hdr,display:"flex",justifyContent:"space-between",alignItems:"flex-end"}}>
        <div><div style={{fontSize:21,fontWeight:800,color:txt}}>Новости</div><div style={{fontSize:11,color:txt2,marginTop:1}}>Обновлено {p(lu.getHours())}:{p(lu.getMinutes())}</div></div>
        <DkB/>
      </div>
      <div style={{padding:"0 16px"}}>
        <div style={cs.card}>
          <div style={{...cs.sec,marginBottom:6}}>Фильтр валют</div>
          <div style={{display:"flex",flexWrap:"wrap",gap:5}}>
            {allC.map(c=><div key={c} onClick={()=>setCalF(p=>p.includes(c)?p.filter(x=>x!==c):[...p,c])} style={{padding:"4px 11px",borderRadius:99,fontSize:11,fontWeight:700,cursor:"pointer",background:calF.includes(c)?AC:bg2,color:calF.includes(c)?"#fff":txt2}}>{c}</div>)}
          </div>
        </div>
        {Object.entries(gr).sort(([a],[b])=>a.localeCompare(b)).map(([date,evs])=>{
          const d=new Date(date+"T12:00:00");
          const isT=date===todayKey;
          const isYe=new Date(date+"T12:00:00")<new Date()&&date!==todayKey;
          return <div key={date}>
            <div style={{fontSize:12,fontWeight:700,color:isT?AC:txt2,marginBottom:7,marginTop:3,display:"flex",alignItems:"center",gap:5}}>
              {isT&&<span style={{background:AC,color:"#fff",fontSize:9,padding:"2px 6px",borderRadius:99,fontWeight:700}}>СЕГОДНЯ</span>}
              {!isT&&!isYe&&<span style={{background:bg2,color:txt2,fontSize:9,padding:"2px 6px",borderRadius:99,fontWeight:700}}>ЗАВТРА+</span>}
              {d.toLocaleDateString("ru-RU",{weekday:"short",day:"numeric",month:"short"})}
            </div>
            {evs.map((e,i)=>(
              <div key={i} style={{...cs.card,marginBottom:7,borderLeft:`3px solid ${iC[e.impact]||"#ccc"}`,opacity:isYe?0.6:1}}>
                <div style={{fontSize:13,fontWeight:700,color:txt,marginBottom:5}}>{e.event}</div>
                <div style={{display:"flex",gap:5,marginBottom:e.actual||e.forecast?6:0}}>
                  <span style={{fontSize:10,padding:"2px 7px",borderRadius:99,background:AC+"22",color:AC,fontWeight:700}}>{e.currency}</span>
                  <span style={{fontSize:10,padding:"2px 7px",borderRadius:99,background:iC[e.impact]+"22",color:iC[e.impact],fontWeight:700}}>{iL[e.impact]||e.impact}</span>
                </div>
                {(e.actual||e.forecast||e.previous)&&<div style={{display:"flex",gap:14}}>
                  {e.actual&&<div><div style={{fontSize:9,color:txt3,fontWeight:600}}>ФАКТ</div><div style={{fontSize:13,fontWeight:800,color:"#27ae60"}}>{e.actual}</div></div>}
                  {e.forecast&&<div><div style={{fontSize:9,color:txt3,fontWeight:600}}>ПРОГНОЗ</div><div style={{fontSize:13,fontWeight:700,color:txt}}>{e.forecast}</div></div>}
                  {e.previous&&<div><div style={{fontSize:9,color:txt3,fontWeight:600}}>ПРЕД.</div><div style={{fontSize:13,fontWeight:700,color:txt2}}>{e.previous}</div></div>}
                </div>}
                {!e.actual&&<div style={{fontSize:10,color:txt3}}>⏳ Ожидается</div>}
              </div>
            ))}
          </div>;
        })}
        <button onClick={()=>window.open("https://www.forexfactory.com/calendar","_blank")} style={{...cs.btn,marginBottom:20}}>🔗 Открыть Forex Factory</button>
      </div>
    </div>;
  }

  function GuruScreen(){
    const inpRef=useRef(null);
    const sugg=["Как справиться с FOMO?","Что делать после крупного убытка?","Как перестать нарушать правила?","Как строить дисциплину?","Объясни loss aversion","Что такое revenge trading?"];
    return <div style={{display:"flex",flexDirection:"column",height:"100%",background:bg}}>
      <div style={{...cs.hdr,paddingBottom:10,flexShrink:0}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
          <div>
            <div style={{fontSize:21,fontWeight:800,color:txt}}>Гуру 🧠</div>
            <div style={{fontSize:12,color:txt2,marginTop:1}}>Психолог трейдера · ИИ</div>
          </div>
          <div style={{display:"flex",gap:7,alignItems:"center"}}>
            <button onClick={()=>{const r=[{r:"a",t:"Привет! Чем могу помочь по психологии трейдинга?"}];setMsgs(r);LS.s("tm_msgs3",r);}} style={{background:bg2,border:`1px solid ${bdr}`,borderRadius:9,padding:"5px 9px",cursor:"pointer",fontSize:11,color:txt2,fontWeight:600}}>Сброс</button>
            <DkB/>
          </div>
        </div>
      </div>
      <div ref={msgsRef} style={{flex:1,overflowY:"auto",padding:"0 14px 8px"}}>
        {msgs.length<=1&&<div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:10,marginTop:2}}>
          {sugg.map((s,i)=><div key={i} onClick={()=>{setGinput(s);inpRef.current?.focus();}} style={{padding:"6px 12px",borderRadius:99,fontSize:11,cursor:"pointer",background:AC+"15",color:AC,fontWeight:600,border:`1px solid ${AC}22`}}>{s}</div>)}
        </div>}
        {msgs.map((m,i)=>(
          <div key={i} className="fu" style={{marginBottom:10,display:"flex",flexDirection:"column",alignItems:m.r==="u"?"flex-end":"flex-start"}}>
            {m.r==="a"&&<div style={{width:24,height:24,borderRadius:"50%",background:"linear-gradient(135deg,#6C5CE7,#a29bfe)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,marginBottom:4}}>🧠</div>}
            <div style={{maxWidth:"90%",padding:"11px 13px",borderRadius:m.r==="u"?"14px 14px 4px 14px":"14px 14px 14px 4px",background:m.r==="u"?AC:bg3,color:m.r==="u"?"#fff":txt,fontSize:13,lineHeight:1.7,border:m.r==="u"?"none":`1px solid ${bdr}`,whiteSpace:"pre-line"}}>
              {m.t}
            </div>
          </div>
        ))}
        {gload&&<div style={{display:"flex",alignItems:"flex-start",gap:7,marginBottom:10}}>
          <div style={{width:24,height:24,borderRadius:"50%",background:"linear-gradient(135deg,#6C5CE7,#a29bfe)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:12}}>🧠</div>
          <div style={{padding:"11px 14px",borderRadius:"14px 14px 14px 4px",background:bg3,border:`1px solid ${bdr}`}}>
            <div style={{display:"flex",gap:3,alignItems:"center"}}>
              {[0,1,2].map(i=><div key={i} style={{width:6,height:6,borderRadius:"50%",background:AC,animation:`dot 1.4s ${i*0.2}s infinite ease-in-out`}}/>)}
            </div>
          </div>
        </div>}
      </div>
      <div style={{padding:"8px 14px 20px",borderTop:`1px solid ${bdr}`,background:bg,flexShrink:0}}>
        <div style={{display:"flex",gap:7}}>
          <textarea ref={inpRef} style={{...cs.ta,flex:1,minHeight:42,maxHeight:100,padding:"10px 12px",fontSize:13}} placeholder="Задай вопрос Гуру..." value={ginput} onChange={e=>setGinput(e.target.value)}
            onKeyDown={e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();sendGuru();}}}/>
          <button onClick={sendGuru} disabled={!ginput.trim()||gload} style={{background:ginput.trim()&&!gload?AC:bg2,color:ginput.trim()&&!gload?"#fff":txt3,border:"none",borderRadius:11,padding:"0 15px",cursor:ginput.trim()&&!gload?"pointer":"default",flexShrink:0,fontSize:17}}>
            {gload?"⏳":"→"}
          </button>
        </div>
        <div style={{fontSize:10,color:txt3,marginTop:4,textAlign:"center"}}>Enter — отправить · Shift+Enter — новая строка</div>
      </div>
    </div>;
  }

  const screens={home:<HomeScreen/>,journal:<JournalScreen/>,library:<LibraryScreen/>,trade:<TradeScreen/>,news:<NewsScreen/>,guru:<GuruScreen/>};

  return <div style={{fontFamily:"'DM Sans',sans-serif",maxWidth:430,margin:"0 auto",height:"100vh",background:bg,display:"flex",flexDirection:"column",overflow:"hidden"}}>
    <div style={{flex:1,overflow:"hidden",display:"flex",flexDirection:"column"}}>{screens[tab]}</div>
    <div style={{background:D?"rgba(15,15,26,0.98)":"rgba(255,255,255,0.98)",backdropFilter:"blur(16px)",borderTop:`1px solid ${bdr}`,display:"flex",padding:"8px 0 max(16px, env(safe-area-inset-bottom))",flexShrink:0,zIndex:100}}>
      {tabs.map(t=>(
        <div key={t.id} onClick={()=>{setTab(t.id);setSelBook(null);setSelChap(null);setNewEntry(false);}} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:2,cursor:"pointer"}}>
          <NI id={t.id} active={tab===t.id}/>
          <span style={{fontSize:9,fontWeight:tab===t.id?700:400,color:tab===t.id?AC:txt3}}>{t.l}</span>
        </div>
      ))}
    </div>
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
